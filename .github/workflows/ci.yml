name: AutoLuce CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.5"

      - name: Create uv venv and sync dependencies
        run: uv sync --frozen

      - name: Lint Python
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest -q

      - name: Smoke test harness (simulation mode)
        run: uv run autoluce baseline --simulate

      - name: Smoke test reproducibility suite
        run: uv run autoluce reproduce --simulate

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deterministic container
        run: docker build -t autoluce .

      - name: Run lint and smoke tests in container
        run: docker run --rm autoluce uv run autoluce reproduce --simulate
