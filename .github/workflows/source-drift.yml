name: Lucebox source drift

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  check-source-pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.5"

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Check tracked Lucebox revision
        run: uv run autoluce source check --remote
